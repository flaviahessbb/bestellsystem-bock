        </div>
        ${fehlend.length > 0
          ? '<span class="badge badge-neu"><span class="bdot bdot-neu"></span>Unvollständig</span>'
          : '<span class="badge badge-geliefert"><span class="bdot bdot-geliefert"></span>Vollständig</span>'}

      <div style="padding:12px 18px">${rows}</div>

}

// packState: { orderId: { artId: 'ok'|'fehlt' } }
let packState = {};

function setPackStatus(orderId, artId, status) {
  if (!packState[orderId]) packState[orderId] = {};
  packState[orderId][artId] = status;
  const okBtn    = document.getElementById(`packok-${orderId}-${artId}`);
  const fehltBtn = document.getElementById(`packfehlt-${orderId}-${artId}`);
  const row      = document.getElementById(`packrow-${orderId}-${artId}`);
  okBtn.classList.toggle('ok',    status === 'ok');
  okBtn.classList.toggle('fehlt', false);
  fehltBtn.classList.toggle('fehlt', status === 'fehlt');
  fehltBtn.classList.toggle('ok',    false);
  row.classList.toggle('status-fehlt', status === 'fehlt');
  updatePackSummary(orderId);
}

function setAllPack(orderId, status) {
  const o = orders.find(x => x.id === orderId);
  if (!o) return;
  o.artikel.forEach(a => setPackStatus(orderId, esc(a.name), status));
}

function updatePackSummary(orderId) {
  const o = orders.find(x => x.id === orderId);
  if (!o) return;
  const state = packState[orderId] || {};
  const total = o.artikel.length;
  const done  = Object.keys(state).length;
  const ok    = Object.values(state).filter(v => v === 'ok').length;
  const fehlt = Object.values(state).filter(v => v === 'fehlt').length;
  const sum = document.getElementById(`packsummary-${orderId}`);
  if (!sum) return;
  sum.innerHTML = `
    <span class="pack-sum-item"><span class="diff-tag diff-ok">OK ${ok} eingepackt</span></span>
    ${fehlt > 0 ? `<span class="pack-sum-item"><span class="diff-tag diff-missing">✕ ${fehlt} fehlen</span></span>` : ''}
    <span style="color:var(--g500);font-size:12px">${done}/${total} bewertet</span>`;
}

function onPackMengeChange(orderId, artId, bestellt, val) {
  const n = parseInt(val) || 0;
  if (n < bestellt) {
    setPackStatus(orderId, artId, 'fehlt');
  } else {
    setPackStatus(orderId, artId, 'ok');
  }
}

function submitPack(orderId) {
  const o = orders.find(x => x.id === orderId);
  if (!o) return;
  const state = packState[orderId] || {};
  // Build packstatus array with actual packed quantities
  o.packstatus = o.artikel.map(a => {
    const mengeInput = document.getElementById(`packmenge-${orderId}-${esc(a.name)}`);
    const eingepackt = mengeInput ? (parseInt(mengeInput.value) || 0) : a.qty;
    return {
      name: a.name,
      qty: a.qty,
      eingepackt,
      status: eingepackt < a.qty ? 'fehlt' : 'ok'
    };
  });
  const fehlend = o.packstatus.filter(p => p.status === 'fehlt');
  if (fehlend.length > 0) {
    // Unvollständig – nur fehlende Artikel in der Bestellung behalten
    o.artikel = fehlend.map(p => ({ name: p.name, qty: p.qty - (p.eingepackt || 0) }));
    o.packFehlend = fehlend.map(p => p.name);
    o.packstatus = null;
    save('bock_v2_orders', orders);
    delete packState[orderId];
    showToast('⚠️ ' + fehlend.length + ' Artikel fehlen – nur Fehlmengen bleiben offen');
  } else {
    // Vollständig → Geliefert → landet im Wareneingang der Filiale
    o.packZeit = nowStr();
    o.status = 'Geliefert';
    o.statusZeit = nowStr();
    // B1 Lager: Abgang buchen
    o.packstatus.forEach(p => {
      const qty = p.eingepackt || p.qty;
      if (qty > 0) {
        b1Lager[p.name] = (b1Lager[p.name] || 0) - qty;
        b1LagerLog.unshift({ ts: Date.now(), art: p.name, delta: -qty, grund: 'Geliefert an ' + o.filiale, filiale: o.filiale });
      }
    });
    save('bock_v2_b1lager', b1Lager);
    save('bock_v2_b1lagerlog', b1LagerLog.slice(0, 500));
    save('bock_v2_orders', orders);
    delete packState[orderId];
    showToast('Vollständig gepackt OK → Wareneingang freigegeben');
  }
  renderB1Packen();
}

function saveLagerbestand() {
  const bearbeiter = (document.getElementById('lb-bearbeiter')?.value || '').trim();
  if (!bearbeiter) { showToast('Bitte zuerst deinen Namen eintragen'); document.getElementById('lb-bearbeiter')?.focus(); return; }
  const allArtikel = INVENTUR_VORLAGE.flatMap(sec => sec.items.map(i => i.name));
  let changes = 0;
  allArtikel.forEach(name => {
    const inp = document.getElementById('lb-' + esc(name));
    if (inp) {
      const newVal = parseInt(inp.value) || 0;
      const oldVal = b1Lager[name] || 0;
      const delta = newVal - oldVal;
      if (delta !== 0) {
        b1LagerLog.unshift({ ts: Date.now(), art: name, delta, grund: 'Manuell angepasst', filiale: 'B1', bearbeiter });
        changes++;
      }
      b1Lager[name] = newVal;
    }
  });
  save('bock_v2_b1lager', b1Lager);
  save('bock_v2_b1lagerlog', b1LagerLog.slice(0, 500));
  showToast(changes > 0 ? `${changes} Änderung(en) gespeichert OK (${bearbeiter})` : 'Keine Änderungen');
  renderB1Lagerbestand();
}

function schnellBuchen(name, delta) {
  // Nur Wert im Input ändern, noch nicht speichern
  const inp = document.getElementById('lb-' + esc(name));
  if (!inp) return;
  const current = parseInt(inp.value) || 0;
  inp.value = Math.max(0, current + (delta || 1));
  inp.style.background = '#EFF6FF';
  setTimeout(() => { inp.style.background = ''; }, 400);
}

function bucheLagerZugang() {
  const artInp = document.getElementById('lb-zugang-art');
  const qtyInp = document.getElementById('lb-zugang-qty');
  const art = artInp?.value.trim();
  const qty = parseInt(qtyInp?.value) || 0;
  if (!art || qty <= 0) { showToast('Bitte Artikel und Menge eingeben'); return; }
  b1Lager[art] = (b1Lager[art] || 0) + qty;
  b1LagerLog.unshift({ ts: Date.now(), art, delta: qty, grund: 'Zugang (manuell)', filiale: 'B1' });
  save('bock_v2_b1lager', b1Lager);
  save('bock_v2_b1lagerlog', b1LagerLog.slice(0, 500));
  artInp.value = ''; qtyInp.value = '';
  showToast('+' + qty + ' ' + art + ' eingebucht OK');
  renderB1Lagerbestand();
}

// === B1 – LAGER MELDEN ================================================
function renderB1Lager() {
  // Build current lager status per artikel
  const artikelFlat = Object.values(VERBRAUCH).flat();
  const aktiv = {};
  lagerMeldungen.filter(m => !m.erledigt).forEach(m => { aktiv[m.artikel] = m.status; });

  const grid = artikelFlat.map(art => {

    const badgeTxt = st === 'leer' ? '🔴 Leer' : st === 'knapp' ? '🟡 Knapp' : 'OK OK';

  const kategorien = Object.entries(VERBRAUCH).map(([kat, items]) => {

      const badgeTxt = st === 'leer' ? '🔴 Leer' : st === 'knapp' ? '🟡 Knapp' : 'OK OK';

            ${st!=='ok'?`<button class="pack-btn ok" style="padding:3px 8px;font-size:10px"

    <p class="subtitle">Markiere Artikel die knapp oder leer sind. Die Verwaltung wird sofort informiert.</p>
    ${warnCount > 0 ? `<div style="background:#FEF3C7;border:1px solid #FDE68A;border-radius:4px;padding:12px 16px;margin-bottom:20px">
      <strong>${warnCount} Artikel</strong> gemeldet – Verwaltung wurde informiert.
    </div>` : ''}
    ${kategorien}`;
}

function setLager(artikel, status) {
  // Remove existing meldung for this artikel
  lagerMeldungen = lagerMeldungen.filter(m => m.artikel !== artikel || m.erledigt);
  if (status !== 'ok') {
    lagerMeldungen.unshift({
      id: Date.now(), artikel, status, zeit: nowStr(), ts: Date.now(), erledigt: false
    });
  }
  save('bock_v2_lager', lagerMeldungen);
  showToast(status === 'ok' ? `${artikel}: Als OK markiert` :
    status === 'knapp' ? `${artikel}: Als knapp gemeldet` : `${artikel}: Als leer gemeldet`);
  renderB1Lager();
  // Refresh nav badge
  document.getElementById('main-nav').innerHTML = buildFilNav();
}

// === ADMIN – LAGER B1 ================================================
function renderAdmLager() {
  const aktiv   = lagerMeldungen.filter(m => !m.erledigt);
  const erledigt= lagerMeldungen.filter(m => m.erledigt).slice(0, 20);
  const leer    = aktiv.filter(m => m.status === 'leer');
  const knapp   = aktiv.filter(m => m.status === 'knapp');

  let html = `
    <div class="eyebrow">Verwaltung</div>
    <h1>Lager B1 – Meldungen</h1>
    <p class="subtitle">Artikel die von B1 als knapp oder leer gemeldet wurden.</p>
    <div class="stats-row" style="grid-template-columns:repeat(3,1fr);margin-bottom:24px">
      <div class="stat"><div class="stat-num" style="color:var(--red)">${leer.length}</div><div class="stat-label">Leer</div></div>
      <div class="stat"><div class="stat-num" style="color:var(--amber)">${knapp.length}</div><div class="stat-label">Knapp</div></div>
      <div class="stat"><div class="stat-num" style="color:var(--green)">${erledigt.length}</div><div class="stat-label">Erledigt</div></div>
    </div>`;

  if (aktiv.length === 0) {
    html += `<div class="empty"><div class="empty-title">Keine aktiven Meldungen</div>
      <p style="font-size:13px;margin-top:4px">B1 meldet sich wenn Artikel knapp oder leer werden.</p></div>`;
  } else {
    // Sort: leer first, then knapp
    [...leer, ...knapp].forEach(m => {
      html += `
        <div class="lager-alert-card ${m.status}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">
            <div>
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">
                <span style="font-family:'Segoe UI',system-ui,-apple-system,sans-serif;font-size:16px">${m.artikel}</span>
                <span class="badge ${m.status==='leer'?'badge-aufschnitt':'badge-neu'}">
                  <span class="bdot ${m.status==='leer'?'bdot-aufschnitt':'bdot-neu'}"></span>
                  ${m.status==='leer'?'Leer':'Knapp'}
                </span>
              </div>
              <div class="lager-alert-meta">Gemeldet: ${m.zeit}</div>
            </div>
            <button class="btn btn-sm btn-green" onclick="erledigeLager(${m.id})">OK Nachbestellt / Erledigt</button>
          </div>
        </div>`;
    });
  }

  if (erledigt.length > 0) {
    html += `<div class="section-divider" style="margin-top:24px"><div class="section-divider-line"></div>
      <div class="section-divider-label">Erledigt</div><div class="section-divider-line"></div></div>`;
    erledigt.forEach(m => {
      html += `<div class="lager-alert-card" style="opacity:.7">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
          <div>
            <span style="font-family:'Segoe UI',system-ui,-apple-system,sans-serif;font-size:15px">${m.artikel}</span>
            <div class="lager-alert-meta">Gemeldet: ${m.zeit} · Erledigt: ${m.erledigtZeit||'–'}</div>
          </div>
          <span class="badge badge-geliefert"><span class="bdot bdot-geliefert"></span>Erledigt</span>
        </div>
      </div>`;
    });
  }

  document.getElementById('c-adm-lager').innerHTML = html;
}

function erledigeLager(id) {
  const m = lagerMeldungen.find(x => x.id === id);
  if (!m) return;
  m.erledigt = true;
  m.erledigtZeit = nowStr();
  save('bock_v2_lager', lagerMeldungen);
  showToast('Als erledigt markiert OK');
  renderAdmLager();
}

function onBaekoQtyChange(input) {
  const val = parseInt(input.value);
  if (val > 0) input.classList.add('has-val');
  else input.classList.remove('has-val');
  updateBaekoPreview();
}

function updateBaekoPreview() {
  const positionen = getBaekoPositionen();
  const btn = document.getElementById('baeko-submit-btn');
  const wrap = document.getElementById('baeko-preview-wrap');
  const rows = document.getElementById('baeko-preview-rows');
  if (btn) btn.disabled = positionen.length === 0;
  if (!wrap || !rows) return;
  if (positionen.length === 0) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  rows.innerHTML = positionen.map(p =>
    `<tr><td>${p.name}</td><td class="baeko-artnr">${p.artnr}</td><td style="color:var(--g500);font-size:12px">${p.einheit}</td><td><strong>${p.menge}</strong></td></tr>`
  ).join('');
}

function getBaekoPositionen() {
  return BAEKO_ARTIKEL
    return (getBaekoListForFil(user.filiale))
    .map(a => ({ ...a, menge: parseInt(document.getElementById('bq-' + a.artnr)?.value) || 0 }))
    .filter(a => a.menge > 0);
}

function submitBaeko() {
  const positionen = getBaekoPositionen();
  if (positionen.length === 0) { showToast('Bitte mindestens eine Menge eintragen'); return; }
  const bearbeiter = (document.getElementById('baeko-bearbeiter')?.value || '').trim();
  if (!bearbeiter) { showToast('Bitte Bearbeiter eingeben'); document.getElementById('baeko-bearbeiter')?.focus(); return; }
  const woche = getNextISOWeek();
  // Remove existing for this week if any
  baekoBestellungen = baekoBestellungen.filter(b => !(b.filiale === user.filiale && b.woche === woche));
  baekoBestellungen.unshift({
    id: Date.now(), filiale: user.filiale, woche, positionen, bearbeiter,
    zeit: nowStr(), ts: Date.now(), status: 'eingereicht'
  });
  save('bock_v2_baeko', baekoBestellungen);
  triggerPushForAdmin('baeko', user.filiale);
  showToast('BÄKO-Bestellung eingereicht OK');
  sendPushSignal('📦 BÄKO-Bestellung', 'Filiale ' + user.filiale + ' hat die BÄKO-Wochenbestellung eingereicht');
  renderFilBaeko();
}

// === BÄKO PDF GENERIERUNG ===============================================

function generateBaekoPDFs() {
  const thisWeek  = getISOWeek(new Date());
  const weekLabel = 'KW ' + thisWeek.split('-W')[1] + ' / ' + thisWeek.split('-W')[0];
  const submitted = baekoBestellungen.filter(b => b.woche === thisWeek);
  if (submitted.length === 0) { showToast('Keine Bestellungen diese Woche'); return; }
  submitted.forEach(b => generateBaekoPDFForFil(b, weekLabel));
  showToast(submitted.length + ' PDF(s) erstellt');
}

function generateBaekoPDFForFil(bestellung, weekLabel) {
  if (!window.jspdf) { showToast('PDF-Bibliothek lädt noch, bitte kurz warten'); return; }
  const { jsPDF } = window.jspdf;
  const doc  = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const fil  = bestellung.filiale;
  const pW   = 210;
  const mg   = 14;
  let   y    = 0;

  // Header
  doc.setFillColor(17, 17, 17);
  doc.rect(0, 0, pW, 30, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(14);
  doc.text('Bäckerei Bock – BÄKO Bestellung', mg, 11);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  doc.text('Filiale ' + fil + '   ·   ' + weekLabel + '   ·   ' + bestellung.zeit, mg, 19);
  doc.text('Eingereicht von: ' + (bestellung.bearbeiter || '–'), mg, 25);
  y = 38;

  // Kategorien
  const kats = [...new Set(bestellung.positionen.map(p => p.kat || 'Sonstiges'))];

  kats.forEach(kat => {
    const items = bestellung.positionen.filter(p => (p.kat || 'Sonstiges') === kat);

    // Kategorie-Header
    doc.setFillColor(240, 240, 240);
    doc.rect(mg, y - 4, pW - mg * 2, 7, 'F');
    doc.setTextColor(60, 60, 60);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(8);
    doc.text(kat.toUpperCase(), mg + 2, y + 1);
    y += 8;

    // Artikel
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    items.forEach((p, idx) => {
      if (y > 275) { doc.addPage(); y = 20; }
      if (idx % 2 === 0) {
        doc.setFillColor(250, 250, 250);
        doc.rect(mg, y - 3.5, pW - mg * 2, 6.5, 'F');
      }
      doc.setTextColor(30, 30, 30);
      doc.text(String(p.artnr), mg + 2, y + 1);
      doc.text(p.name.length > 45 ? p.name.substring(0, 43) + '…' : p.name, mg + 22, y + 1);
      doc.setFont('helvetica', 'bold');
      doc.text(String(p.menge), pW - mg - 15, y + 1, { align: 'right' });
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(120, 120, 120);
      doc.text(p.einheit || 'St', pW - mg - 2, y + 1, { align: 'right' });
      doc.setTextColor(200, 200, 200);
      doc.line(mg, y + 3, pW - mg, y + 3);
      y += 7;
    });
    y += 4;
  });

  // Summe
  if (y > 268) { doc.addPage(); y = 20; }
  doc.setFillColor(17, 17, 17);
  doc.rect(mg, y, pW - mg * 2, 8, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(9);
  doc.text('Gesamt: ' + bestellung.positionen.length + ' Artikel', mg + 2, y + 5.5);
  y += 14;

  // Footer
  doc.setTextColor(150, 150, 150);
  doc.setFont('helvetica', 'normal');

// --- ISO Week helper -------------------------------------------------
function getISOWeek(date) {
  const d = new Date(date);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 4 - (d.getDay() || 7));
  const yearStart = new Date(d.getFullYear(), 0, 1);
  const wk = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  return `${d.getFullYear()}-W${String(wk).padStart(2,'0')}`;
}

function getNextISOWeek() {
  const today = new Date();
  const isFriday = today.getDay() === 5; // 5 = Freitag
  // Freitag: Bestellung gilt für die nächste Woche (wie gewünscht)
  // Andere Tage: auch nächste Woche (da Filiale immer freitags bestellt)
  const next = new Date(today);
  next.setDate(today.getDate() + 7);
  return getISOWeek(next);
}

function nextKWLabel() {
  const nw = getNextISOWeek();
  const [year, wStr] = nw.split('-W');
  const wn = parseInt(wStr);
  // Calculate Monday of that week
  const jan4 = new Date(parseInt(year), 0, 4);
  const mon = new Date(jan4);
  mon.setDate(jan4.getDate() - (jan4.getDay() || 7) + 1 + (wn - 1) * 7);
  const fri = new Date(mon); fri.setDate(mon.getDate() + 4);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  const f = x => x.toLocaleDateString('de-DE', {day:'2-digit', month:'2-digit'});
  const today = new Date();
  const isFriday = today.getDay() === 5;
  return `KW ${wn} / ${year} &nbsp;(${f(mon)} – ${f(sun)})${isFriday ? ' &nbsp;OK Freitags-Bestellung' : ''}`;
}

function updateInvProgress() {
  const inputs = document.querySelectorAll('.inv-qty-input');
  const total = inputs.length;
  const filled = [...inputs].filter(i => i.value !== '').length;
  const bar = document.getElementById('inv-progress-bar');
  const lbl = document.getElementById('inv-progress-label');
  if (bar) bar.style.width = Math.round((filled/total)*100) + '%';
  if (lbl) lbl.textContent = `${filled} von ${total} ausgefüllt`;
}

function submitInventur() {
  const sections = getInventurArtikel();
  const positionen = {};
  let filledCount = 0;
  sections.forEach(sec => {
    sec.items.forEach(item => {
      const inp = document.getElementById('inv-' + esc(item));
      const val = inp ? inp.value.trim() : '';
      positionen[item] = val !== '' ? parseInt(val) : null;
      if (val !== '') filledCount++;
    });
  });
  if (filledCount === 0) { showToast('Bitte mindestens einen Wert eintragen'); return; }

  const monthKey = getMonthKey();
  // Remove existing for this month/filiale
  inventuren = inventuren.filter(i => !(i.filiale === user.filiale && i.monat === monthKey));
  inventuren.unshift({
    id: Date.now(), filiale: user.filiale, monat: monthKey,
    positionen, filledCount,
    totalCount: sections.reduce((s,sec) => s + sec.items.length, 0),
    zeit: nowStr(), ts: Date.now()
  });
  save('bock_v2_inventur', inventuren);
  showToast('Inventur eingereicht OK');
  renderFilInventur();
}

// Lieferungen eines Artikels für eine Filiale in einem Monat
// Nutzt Wareneingang (tatsächlich erhalten) falls vorhanden, sonst bestellte Menge
function getLieferungFuerMonat(filiale, artikel, monatKey) {
  const [y, m] = monatKey.split('-').map(Number);
  const start = new Date(y, m-1, 1).getTime();
  const end   = new Date(y, m, 1).getTime();

  return orders
    .filter(o => o.filiale === filiale && o.ts >= start && o.ts < end && o.status === 'Geliefert')
    .reduce((sum, o) => {
      // Use wareneingang (actual received) if available, else ordered qty
      if (o.wareneingang && o.wareneingang.abweichungen) {
        const abw = o.wareneingang.abweichungen.find(a => a.name === artikel);
        if (abw) return sum + abw.erhalten;
      }
      const art = o.artikel.find(a => a.name === artikel);
      return sum + (art ? (art.qty || 1) : 0);
    }, 0);
}

// Bestandsrechnung für einen Artikel einer Filiale
// Gibt zurück: { vormonat, lieferungen, endbestand, verbrauch }
function bestandsrechnung(filiale, artikel, monatKey) {
  const [y, m] = monatKey.split('-').map(Number);
  const prevDate = new Date(y, m-2, 1);
  const prevKey  = `${prevDate.getFullYear()}-${String(prevDate.getMonth()+1).padStart(2,'0')}`;

  const invPrev    = inventuren.find(i => i.filiale === filiale && i.monat === prevKey);
  const invCurrent = inventuren.find(i => i.filiale === filiale && i.monat === monatKey);

  const vormonat   = invPrev    ? (invPrev.positionen[artikel]    ?? null) : null;
  const endbestand = invCurrent ? (invCurrent.positionen[artikel] ?? null) : null;
  const lieferungen = getLieferungFuerMonat(filiale, artikel, monatKey);

  // Verbrauch = Vormonat + Lieferungen - Endbestand
  const verbrauch = (vormonat !== null && endbestand !== null)
    ? Math.max(0, vormonat + lieferungen - endbestand)
    : null;

  return { vormonat, lieferungen, endbestand, verbrauch };
}

    `<button class="month-chip ${m===selectedMonth?'active':''}" onclick="setInvMonth2('${m}')">${getMonthLabel(m)}</button>`
  ).join('');

  const statusBadges = FILIALEN.map(f => {
    const inv = inventuren.find(i => i.filiale === f && i.monat === selectedMonth);
    return `<div class="baeko-fil-stat ${inv?'submitted':'pending'}">
      ${inv
        ? `<span class="badge badge-geliefert"><span class="bdot bdot-geliefert"></span>${f}</span>
           <span style="font-size:12px;color:var(--g500)">${inv.filledCount}/${inv.totalCount}</span>`
        : `<span class="badge badge-pending"><span class="bdot bdot-pending"></span>${f}</span>
           <span style="font-size:12px;color:var(--g500)">Ausstehend</span>`}
    </div>`;
  }).join('');

  const sections = getInventurArtikel();

  const filCards = FILIALEN.map(f => {
    const inv = inventuren.find(i => i.filiale === f && i.monat === selectedMonth);
    if (!inv) return `
      <div class="inv-fil-card" style="opacity:.55">
        <div class="inv-fil-header">
          <span class="inv-fil-title">Filiale ${f}</span>
          <span class="badge badge-pending"><span class="bdot bdot-pending"></span>Nicht eingereicht</span>
        </div>
      </div>`;

    // Build rows with Bestandsrechnung
    const tableRows = sections.map(sec => {
      const rows = sec.items.map(item => {
        const { vormonat, lieferungen, endbestand, verbrauch } = bestandsrechnung(f, item, selectedMonth);
        const hasEnd = endbestand !== null;
        return `<tr>
          <td style="padding-left:${sec.gruppe==='Aufschnitt & Waren'?'8px':'4px'}">${item}</td>
          <td style="text-align:center;color:var(--g500)">${vormonat !== null ? vormonat : '<span style="color:var(--g300)">–</span>'}</td>
          <td style="text-align:center;color:var(--blue)">${lieferungen > 0 ? '+'+lieferungen : '<span style="color:var(--g300)">–</span>'}</td>
          <td style="text-align:center;font-family:\'Cambria\',Georgia,serif;font-size:15px;font-weight:400">
            ${hasEnd ? `<strong>${endbestand}</strong>` : '<span style="color:var(--g300)">–</span>'}
          </td>
          <td style="text-align:center">
            ${verbrauch !== null
              ? `<span style="font-weight:700;color:${verbrauch>0?'var(--black)':'var(--g400)'}">${verbrauch}</span>`
              : '<span style="color:var(--g300)">–</span>'}
          </td>
        </tr>`;
      }).join('');
      return `<tr class="kat-hdr"><td colspan="5" style="padding:8px 8px 4px;font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--g500);background:var(--g100)">${sec.gruppe} – ${sec.kat}</td></tr>` + rows;
    }).join('');

    return `
      <div class="inv-fil-card">
        <div class="inv-fil-header" onclick="toggleInvFil('invfil-${f}')">
          <div>
            <span class="inv-fil-title">Filiale ${f}</span>
            <span style="font-size:12px;color:var(--g500);margin-left:10px">Eingereicht: ${inv.zeit}</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="badge badge-geliefert"><span class="bdot bdot-geliefert"></span>${inv.filledCount} Artikel</span>
            <span style="color:var(--g500)">v</span>
          </div>
        </div>
        <div class="inv-fil-body" id="invfil-${f}">
          <table class="inv-compare-table">
            <thead><tr>
              <th>Artikel</th>
              <th style="text-align:center">Vormonat</th>
              <th style="text-align:center;color:var(--blue)">Lieferungen</th>
              <th style="text-align:center">Endbestand</th>
              <th style="text-align:center">Verbrauch</th>
            </tr></thead>
            <tbody>${tableRows}</tbody>
          </table>
          <div style="font-size:11px;color:var(--g500);padding:10px 8px;border-top:1px solid var(--border)">
            Verbrauch = Vormonat + Lieferungen − Endbestand
          </div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('c-adm-inv-overview').innerHTML = `
    <div class="eyebrow">Verwaltung</div>
    <h1>Inventur-Übersicht</h1>
    <p class="subtitle">Monatliche Bestandserfassung mit automatischer Verbrauchsrechnung.</p>

    ${months.length > 0 ? `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px">${monthTabs}</div>` : ''}

    <div class="card" style="margin-bottom:20px">
      <div class="eyebrow" style="margin-bottom:10px">Status – ${getMonthLabel(selectedMonth)}</div>
      <div class="baeko-status-row">${statusBadges}</div>
      ${missing.length > 0 && selectedMonth === monthKey
        ? `<div style="font-size:13px;color:var(--amber);margin-top:6px">⚠️ Noch ausstehend: <strong>${missing.join(', ')}</strong></div>`
        : submitted.length > 0 ? '<div style="font-size:13px;color:var(--green);margin-top:6px">OK Alle Inventuren eingegangen</div>' : ''}
    </div>

    ${inventuren.filter(i => i.monat === selectedMonth).length > 0
      ? filCards
      : `<div class="empty"><div class="empty-title">Keine Inventuren für diesen Monat</div>
          <p style="font-size:13px;margin-top:4px">Filialen reichen ihre Inventur am Monatsende ein.</p></div>`}`;
}

  window._invSelectedMonth = m;
  renderAdmInvOverview();
}

function addHWArtikel(kat) {

}

}

// --- BÄKO JE FILIALE --------------------------------------------------
function buildBaekoSettings() {
  // Per-filiale BÄKO lists – stored in window._baekoPerFil
  if (!window._baekoPerFil) window._baekoPerFil = {};

  const filTabs = FILIALEN.map(f =>
    `<button class="settings-tab ${f===editBaekoFil?'active':''}" onclick="setBaekoEditFil('${f}')">${f}</button>`
  ).join('');

  // Get current list for this filiale (fallback to global BAEKO_ARTIKEL)
  const filArtikel = window._baekoPerFil[editBaekoFil]
    ? window._baekoPerFil[editBaekoFil]
    : BAEKO_ARTIKEL.map(a => ({...a}));

  const kats = [...new Set(filArtikel.map(a => a.kat))];

  const katBlocks = kats.map(kat => {
    const items = filArtikel.filter(a => a.kat === kat);
    return `
      <div class="settings-kat-block">
        <div class="settings-kat-header">
          <span class="settings-kat-title">${kat}</span>
        </div>
        <div class="settings-kat-body">
          <div style="display:grid;grid-template-columns:1fr 80px 70px 28px;gap:8px;padding:4px 0 8px;border-bottom:1px solid var(--border);margin-bottom:4px">
            <span style="font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--g500)">Artikelname</span>
            <span style="font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--g500)">Art.-Nr.</span>
            <span style="font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--g500)">Einheit</span>
            <span></span>
          </div>
          ${items.map((a, i) => {
            const gi = filArtikel.indexOf(a);
            return `<div class="settings-baeko-row">
              <span style="font-size:13px">${a.name}</span>
              <span style="font-size:12px;color:var(--g500)">${a.artnr}</span>
              <span style="font-size:12px;color:var(--g500)">${a.einheit}</span>
              <button class="icon-btn del" onclick="deleteBaekoArtikel(${gi})">✕</button>
            </div>`;
          }).join('')}
          <div style="margin-top:10px;display:grid;grid-template-columns:1fr 90px 60px auto;gap:6px;align-items:center">
            <input type="text"   id="baeko-add-name-${esc(kat)}"    placeholder="Artikelname">
            <input type="number" id="baeko-add-artnr-${esc(kat)}"   placeholder="Art.-Nr.">
            <input type="text"   id="baeko-add-einh-${esc(kat)}"    placeholder="Einheit">
            <button class="btn btn-outline btn-sm" onclick="addBaekoArtikel('${escQ(kat)}')">+</button>
          </div>
        </div>
      </div>`;
  }).join('');

  return `
    <div class="settings-section">
      <div class="settings-section-title">
        BÄKO-Liste je Filiale
        <span class="saved-flash" id="baeko-saved">OK Gespeichert</span>
      </div>
      <p style="font-size:13px;color:var(--g500);margin-bottom:16px">Jede Filiale kann eine eigene BÄKO-Artikelliste haben. Standardmäßig gilt die gemeinsame Liste.</p>
      <div class="settings-tab-row">${filTabs}</div>
      <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
        ${window._baekoPerFil[editBaekoFil]
          ? `<span style="font-size:12px;color:var(--green);font-weight:600">OK Eigene Liste für ${editBaekoFil}</span>
             <button class="btn btn-outline btn-sm" onclick="resetBaekoFil()">Zurück zur Standardliste</button>`
          : `<span style="font-size:12px;color:var(--g500)">Zeigt Standardliste · Änderungen erstellen eigene Liste für ${editBaekoFil}</span>`}
      </div>
      ${katBlocks}
      <div class="settings-add-row" style="margin-top:12px">
        <input type="text" id="baekokatname" placeholder="Neue Kategorie...">
        <button class="btn btn-primary btn-sm" onclick="addBaekoKat()">+ Kategorie</button>
      </div>
    </div>`;
}

function setBaekoEditFil(f) {
  editBaekoFil = f;
  renderSettingsPane();
}

function getFilBaekoList() {
  if (!window._baekoPerFil) window._baekoPerFil = {};
  return window._baekoPerFil[editBaekoFil]
    ? window._baekoPerFil[editBaekoFil]
    : BAEKO_ARTIKEL.map(a => ({...a}));
}

function addBaekoArtikel(kat) {
  const name  = document.getElementById('baeko-add-name-'  + esc(kat))?.value.trim();
  const artnr = document.getElementById('baeko-add-artnr-' + esc(kat))?.value.trim();
  const einh  = document.getElementById('baeko-add-einh-'  + esc(kat))?.value.trim();
  if (!name || !artnr) { showToast('Bitte Name und Art.-Nr. eingeben'); return; }
  if (!window._baekoPerFil) window._baekoPerFil = {};
  if (!window._baekoPerFil[editBaekoFil]) window._baekoPerFil[editBaekoFil] = getFilBaekoList();
  window._baekoPerFil[editBaekoFil].push({ name, artnr: parseInt(artnr)||artnr, einheit: einh||'St', kat });
  saveBaekoPer(); renderSettingsPane(); flashSaved('baeko-saved');
}

function deleteBaekoArtikel(idx) {
  if (!window._baekoPerFil) window._baekoPerFil = {};
  if (!window._baekoPerFil[editBaekoFil]) window._baekoPerFil[editBaekoFil] = getFilBaekoList();
  window._baekoPerFil[editBaekoFil].splice(idx, 1);
  saveBaekoPer(); renderSettingsPane(); flashSaved('baeko-saved');
}

function addBaekoKat() {
  const val = document.getElementById('baekokatname')?.value.trim();
  if (!val) return;
  if (!window._baekoPerFil) window._baekoPerFil = {};
  if (!window._baekoPerFil[editBaekoFil]) window._baekoPerFil[editBaekoFil] = getFilBaekoList();
  // Add dummy entry to create the category
  window._baekoPerFil[editBaekoFil].push({ name:'(Artikel hinzufügen)', artnr:0, einheit:'St', kat: val });
  saveBaekoPer(); renderSettingsPane();
}

function resetBaekoFil() {
  if (!confirm(`Eigene Liste für ${editBaekoFil} löschen und zur Standardliste zurückkehren?`)) return;
  delete window._baekoPerFil[editBaekoFil];
  saveBaekoPer(); renderSettingsPane();
}

function saveBaekoPer() {
  settingsBaeko = JSON.parse(JSON.stringify(window._baekoPerFil || {}));
  save('bock_v2_baeko_settings', settingsBaeko);
}

function renderFilTemp() {
  const fil = user.filiale;
  const today = new Date().toISOString().split('T')[0];
  const todayStr = new Date().toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric',weekday:'long'});
  const existing = tempProtokolle.find(t => t.filiale===fil && t.datum===today);
  const recent = tempProtokolle.filter(t=>t.filiale===fil).sort((a,b)=>b.ts-a.ts).slice(0,14);

  const fruehBereiche = TEMP_BEREICHE.filter(b=>b.schicht==='frueh');
  const spaetBereiche = TEMP_BEREICHE.filter(b=>b.schicht==='spaet');

  const fruehDone = existing?.schichten?.frueh;
  const spaetDone = existing?.schichten?.spaet;

  function buildSchichtRows(bereiche, schicht) {
    const done = schicht==='frueh' ? fruehDone : spaetDone;
    return bereiche.map(b => {
      const val = done ? (done.werte[b.id]??'') : '';
      const status = val==='' ? '' : (parseFloat(val)>=b.min && parseFloat(val)<=b.max) ? 'ok' : 'alarm';
      return `<tr>
        <td style="font-size:13px;padding:10px 12px;font-weight:500">${b.gruppe}</td>
        <td style="font-size:12px;color:var(--g500);padding:10px 12px">${b.min}–${b.max}°C</td>
        <td style="padding:8px 12px">
          <div style="display:flex;align-items:center;gap:8px">
            <input type="number" step="0.1" id="temp-${schicht}-${b.id}" value="${val}" placeholder="–"
              ${done?'readonly':''}
              style="width:80px;padding:6px 10px;font-size:14px;text-align:center;border:1px solid ${status==='alarm'?'var(--red)':status==='ok'?'var(--green)':'var(--border)'};border-radius:3px;background:${status==='alarm'?'#FEF2F2':status==='ok'?'#F0FDF4':'var(--white)'};font-family:'Segoe UI',sans-serif"
              oninput="checkTempInput(this,'${b.id}',${b.min},${b.max})">
            <span id="tempicon-${b.id}" style="font-size:16px">${status==='ok'?'OK':status==='alarm'?'⚠️':'–'}</span>
          </div>
        </td>
      </tr>`;
    }).join('');
  }

  function schichtCard(label, schicht, bereiche, icon) {
    const done = schicht==='frueh' ? fruehDone : spaetDone;
    const alarms = done ? TEMP_BEREICHE.filter(b=>b.schicht===schicht&&done.werte[b.id]!=null&&(done.werte[b.id]<b.min||done.werte[b.id]>b.max)) : [];
    return `
    <div class="card" style="padding:0;overflow:hidden;margin-bottom:16px">
      <div style="padding:12px 18px;background:var(--g100);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <span style="font-weight:700;font-size:14px">${icon} ${label} · 08:00 Uhr</span>
        ${done
          ? `<span class="badge ${alarms.length?'badge-neu':'badge-geliefert'}"><span class="bdot ${alarms.length?'bdot-neu':'bdot-geliefert'}"></span>${alarms.length?'⚠️ Alarm':'OK Eingetragen'} · ${done.name}</span>`
          : '<span class="badge badge-neu" style="background:#FEF3C7;color:#92400E">⏳ Noch offen</span>'}
      </div>
      <table style="width:100%;border-collapse:collapse">
        <thead><tr style="border-bottom:1px solid var(--border)">
          <th style="text-align:left;padding:8px 12px;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--g500)">Gerät</th>
          <th style="text-align:left;padding:8px 12px;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--g500)">Sollbereich</th>
          <th style="text-align:left;padding:8px 12px;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--g500)">Temperatur</th>
        </tr></thead>
        <tbody>${buildSchichtRows(bereiche, schicht)}</tbody>
      </table>
      ${!done ? `
      <div style="padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap">
        <div style="flex:1;min-width:180px">
          <label style="font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--g500);display:block;margin-bottom:5px">Name ${label} *</label>
          <input type="text" id="temp-name-${schicht}" placeholder="Vor- und Nachname"
            style="width:100%;padding:8px 11px;font-size:13px;border:1px solid var(--border);border-radius:3px;font-family:'Segoe UI',sans-serif;box-sizing:border-box">
        </div>
        <button class="btn btn-primary" onclick="submitTemp('${schicht}')">Schicht speichern</button>
      </div>` : ''}
    </div>`;
  }

  // History rows — show both shifts
  const histRows = recent.length ? recent.map(t => {
    const alarms = TEMP_BEREICHE.filter(b => {
      const schichtData = t.schichten?.[b.schicht];
      if(!schichtData) return false;
      const v = schichtData.werte[b.id];
      return v!=null && v!=='' && (parseFloat(v)<b.min||parseFloat(v)>b.max);
    });
    const frueh = t.schichten?.frueh;
    const spaet = t.schichten?.spaet;
    // Fehlende Schichten
    const missing = [];
    if(!frueh) missing.push('Frühschicht');
    if(!spaet) missing.push('Spätschicht');
    return `<tr style="border-bottom:1px solid var(--g100)">
      <td style="font-size:13px;padding:9px 12px">${new Date(t.datum+'T12:00:00').toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit'})}</td>
      <td style="font-size:12px;padding:9px 12px;color:var(--g500)">
        ${frueh?`🌅 ${frueh.name}`:'<span style="color:var(--red)">🌅 fehlt</span>'}<br>
        ${spaet?`🌆 ${spaet.name}`:'<span style="color:var(--amber)">🌆 fehlt</span>'}
      </td>
      <td style="padding:9px 12px">
        ${alarms.length>0?`<span style="color:var(--red);font-size:12px;font-weight:600">⚠️ ${alarms.length} Alarm(e)</span>`:''}
        ${missing.length>0?`<span style="color:var(--amber);font-size:12px;font-weight:600">${missing.length?'⏳ '+missing.join(', ')+' fehlt':''}</span>`:''}
        ${alarms.length===0&&missing.length===0?'<span style="color:var(--green);font-size:12px">OK Vollständig</span>':''}
      </td>
      <td style="font-size:12px;color:var(--g500);padding:9px 12px">${t.zeit||''}</td>
    </tr>`;
  }).join('') : '<tr><td colspan="4" style="padding:16px;text-align:center;color:var(--g500);font-size:13px">Noch keine Einträge</td></tr>';

  // Reminder banner if today not yet complete
  const reminderBanner = (!fruehDone || !spaetDone) ? `
    <div style="background:#FEF3C7;border:1px solid #FDE68A;border-radius:4px;padding:12px 16px;margin-bottom:16px;font-size:13px;display:flex;align-items:center;gap:10px">
      ⏰ <strong>Erinnerung:</strong> ${!fruehDone && !spaetDone ? 'Heute noch keine Temperaturen eingetragen!' : !fruehDone ? 'Frühschicht (08:00) fehlt noch.' : 'Spätschicht (16:00) fehlt noch.'}
    </div>` : '';

  document.getElementById('c-fil-temp').innerHTML = `
    <div class="eyebrow">Filiale ${fil} · HACCP</div>
    <h1>Temperaturkontrolle</h1>
    <p class="subtitle">${todayStr} · Sollbereich überall 4–6 °C · Zweimal täglich eintragen</p>
    ${reminderBanner}
    ${schichtCard('Frühschicht', 'frueh', fruehBereiche, '🌅')}
    ${schichtCard('Spätschicht', 'spaet', spaetBereiche, '🌆')}

    <div style="font-size:14px;font-weight:600;margin-bottom:10px">Letzte Einträge</div>
    <div class="card" style="padding:0;overflow:hidden">
      <table style="width:100%;border-collapse:collapse">
        <thead><tr style="background:var(--g100);border-bottom:1px solid var(--border)">
          <th style="text-align:left;padding:8px 12px;font-size:10px;text-transform:uppercase;color:var(--g500);font-weight:600;letter-spacing:.08em">Datum</th>
          <th style="text-align:left;padding:8px 12px;font-size:10px;text-transform:uppercase;color:var(--g500);font-weight:600;letter-spacing:.08em">Namen</th>
          <th style="padding:8px 12px;font-size:10px;text-transform:uppercase;color:var(--g500);font-weight:600;letter-spacing:.08em">Status</th>
          <th style="padding:8px 12px;font-size:10px;text-transform:uppercase;color:var(--g500);font-weight:600;letter-spacing:.08em">Zuletzt</th>
        </tr></thead>
        <tbody>${histRows}</tbody>
      </table>
    </div>`;
}

function checkTempInput(inp, id, min, max) {
  const v = parseFloat(inp.value);
  const icon = document.getElementById('tempicon-'+id);
  if(isNaN(v)){ inp.style.borderColor='var(--border)'; inp.style.background='var(--white)'; if(icon)icon.textContent='–'; return; }
  if(v>=min&&v<=max){ inp.style.borderColor='var(--green)'; inp.style.background='#F0FDF4'; if(icon)icon.textContent='OK'; }
  else { inp.style.borderColor='var(--red)'; inp.style.background='#FEF2F2'; if(icon)icon.textContent='⚠️'; }
}

function submitTemp(schicht) {
  const name = document.getElementById(`temp-name-${schicht}`)?.value.trim();
  if(!name){ showToast('Bitte Namen eintragen'); document.getElementById(`temp-name-${schicht}`)?.focus(); return; }
  const bereiche = TEMP_BEREICHE.filter(b=>b.schicht===schicht);
  const werte = {};
  bereiche.forEach(b => {
    const v = document.getElementById(`temp-${schicht}-${b.id}`)?.value;
    werte[b.id] = v!==''&&v!==undefined ? parseFloat(v) : null;
  });
  const today = new Date().toISOString().split('T')[0];
  let eintrag = tempProtokolle.find(t=>t.filiale===user.filiale&&t.datum===today);
  if(!eintrag){
    eintrag = { filiale:user.filiale, datum:today, zeit:nowStr(), ts:Date.now(), schichten:{} };
    tempProtokolle.unshift(eintrag);
  }
  if(!eintrag.schichten) eintrag.schichten = {};
  eintrag.schichten[schicht] = { name, werte, zeit:nowStr() };
  eintrag.zeit = nowStr();
  // Keep legacy name field for admin compat
  eintrag.name = [eintrag.schichten.frueh?.name, eintrag.schichten.spaet?.name].filter(Boolean).join(' / ');
  save('bock_v2_temp', tempProtokolle);
  const alarms = bereiche.filter(b=>werte[b.id]!=null&&(werte[b.id]<b.min||werte[b.id]>b.max));
  showToast(alarms.length ? `⚠️ ${alarms.length} Alarm(e) gespeichert!` : `${schicht==='frueh'?'Frühschicht':'Spätschicht'} gespeichert OK`);
  renderFilTemp();
}

        </div>
        ${done
          ? '<span class="badge badge-geliefert"><span class="bdot bdot-geliefert"></span>Abgeschlossen</span>'
          : `<div class="inv-progress" style="width:120px"><div class="inv-progress-bar" style="width:${Math.round(checked.length/cl.aufgaben.length*100)}%"></div></div>`}
      </div>

      </div>` : `<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:12px;color:var(--g500)">OK Abgezeichnet von <strong>${log.name}</strong> · ${log.signZeit||''}</div>`}

    <div class="eyebrow">Filiale ${fil}</div>

function signChecklist(clId, datum) {
  const fil = user.filiale;
  const nameInp = document.getElementById('clname-' + clId);
  const name = nameInp?.value.trim();
  if(!name){ showToast('Bitte Name eintragen'); return; }
  const logKey = `${fil}-${clId}-${datum}`;
  let log = checklisteLog.find(l=>l.key===logKey);
  if(!log){ log={key:logKey,filiale:fil,clId,datum,checked:[],ts:Date.now()}; checklisteLog.push(log); }
  log.name = name;
  log.signZeit = nowStr();
  save('bock_v2_cl_log', checklisteLog);
  showToast('Abgezeichnet OK');
  renderFilReinigungsliste();
}

function toggleCheck(clId, datum, idx) {
  const fil = user.filiale;
  const logKey = `${fil}-${clId}-${datum}`;
  let log = checklisteLog.find(l=>l.key===logKey);
  if(!log){ log={key:logKey,filiale:fil,clId,datum,checked:[],ts:Date.now()}; checklisteLog.push(log); }
  const pos = log.checked.indexOf(idx);
  if(pos>-1) log.checked.splice(pos,1); else log.checked.push(idx);
  save('bock_v2_cl_log', checklisteLog);
  renderFilReinigungsliste();
}

        <div>
          <label class="field-label">Titel</label>
          <input type="text" id="news-titel" placeholder="z.B. Neue Preisliste ab Montag" style="width:100%;padding:9px 12px;font-size:14px;border:1px solid var(--border);border-radius:3px;font-family:'Segoe UI',sans-serif;box-sizing:border-box">
        </div>
        <div>
          <label class="field-label">Nachricht</label>
          <textarea id="news-text" rows="3" placeholder="Text der Ankündigung..." style="font-size:14px"></textarea>
        </div>
        <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap">
          <div>
            <label class="field-label">An Filialen</label>
            <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
              <label style="font-size:13px;display:flex;align-items:center;gap:4px;cursor:pointer">
                <input type="checkbox" id="news-all" checked onchange="toggleAllFil(this)"> Alle
              </label>
              ${FILIALEN.map(f=>`<label style="font-size:13px;display:flex;align-items:center;gap:4px;cursor:pointer">
                <input type="checkbox" class="news-fil-cb" value="${f}" checked> ${f}
              </label>`).join('')}
            </div>
          </div>
          <label style="font-size:13px;display:flex;align-items:center;gap:6px;cursor:pointer;margin-top:16px">
            <input type="checkbox" id="news-pinned"> 📌 Anpinnen
          </label>
        </div>
        <button class="btn btn-primary" onclick="submitNews()">Ankündigung senden</button>
      </div>
    </div>

    ${sorted.length ? `<div style="font-size:14px;font-weight:600;margin-bottom:12px">Gesendete Ankündigungen</div>${cards}` : ''}`;
}

function toggleAllFil(cb) {
  document.querySelectorAll('.news-fil-cb').forEach(c=>c.checked=cb.checked);
}

function submitNews() {
  const titel = document.getElementById('news-titel')?.value.trim();
  const text  = document.getElementById('news-text')?.value.trim();
  if(!titel||!text){ showToast('Bitte Titel und Text ausfüllen'); return; }
  const cbs = [...document.querySelectorAll('.news-fil-cb:checked')].map(c=>c.value);
  if(!cbs.length){ showToast('Bitte mindestens eine Filiale wählen'); return; }
  const pinned = document.getElementById('news-pinned')?.checked||false;
  newsItems.unshift({ id:Date.now(), titel, text, filialen:cbs, pinned, zeit:nowStr(), ts:Date.now() });
  save('bock_v2_news', newsItems);
  showToast('Ankündigung gesendet OK');
  renderAdmNews();
}

function deleteNews(id) {
  newsItems = newsItems.filter(n=>n.id!==id);
  save('bock_v2_news', newsItems);
  renderAdmNews();
}

// Show news on filiale home (inject into renderFilHome)
function getNewsForFil(fil) {
  return newsItems.filter(n=>n.filialen.includes(fil)).sort((a,b)=>b.pinned-a.pinned||b.ts-a.ts).slice(0,3);
}


// === ADMIN – B1 LAGERBESTAND ÜBERSICHT + HÄNDISCHE EINGABE ===========
function renderAdmB1Lager() {
  const gruppen = INVENTUR_VORLAGE.filter(s => s.gruppe === 'Tee' || s.gruppe === 'Kaffee');

  // Eingabefelder zum händischen Setzen
  let inputRows = '';
  gruppen.forEach(sec => {
    inputRows += `<tr style="background:var(--g200)">
      <td colspan="3" style="padding:7px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--g700)">${sec.gruppe}</td>
    </tr>`;
    sec.items.forEach(art => {
      const bestand = b1Lager[art.name] || 0;
      const status = bestand <= 0 ? 'leer' : bestand <= 5 ? 'knapp' : 'ok';
      const borderCol = status==='leer'?'var(--red)':status==='knapp'?'var(--amber)':'var(--border)';
      const bgCol = status==='leer'?'#FEF2F2':status==='knapp'?'#FFFBEB':'var(--white)';
      inputRows += `<tr style="border-bottom:1px solid var(--g100)">
        <td style="padding:9px 16px;font-size:14px;font-weight:500">${art.name}</td>
        <td style="padding:9px 10px;font-size:12px;color:var(--g500)">${art.einheit}</td>
        <td style="padding:7px 10px;text-align:center">
          <input type="number" min="0" value="${bestand}" id="adm-lb-${esc(art.name)}"
            style="width:90px;padding:7px 10px;font-size:18px;font-weight:700;text-align:center;border:2px solid ${borderCol};border-radius:4px;font-family:'Segoe UI',sans-serif;background:${bgCol}">
        </td>
      </tr>`;
    });
  });

  // Letzte Buchungen
  const logRows = b1LagerLog.slice(0, 20).map(e => `
    <tr style="border-bottom:1px solid var(--g100)">
      <td style="padding:7px 12px;font-size:12px;color:var(--g500)">${new Date(e.ts).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'2-digit'})} ${new Date(e.ts).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})}</td>
      <td style="padding:7px 12px;font-size:13px">${e.art}</td>
      <td style="padding:7px 12px;font-size:13px;font-weight:700;color:${e.delta>0?'var(--green)':'var(--red)'}">${e.delta>0?'+':''}${e.delta}</td>
      <td style="padding:7px 12px;font-size:12px;color:var(--g500)">${e.grund}</td>
      <td style="padding:7px 12px;font-size:12px;font-weight:500;color:var(--g700)">${e.bearbeiter||'–'}</td>
    </tr>`).join('');

  document.getElementById('c-adm-b1lager').innerHTML = `
    <div class="eyebrow">Admin</div>
    <h1>B1 Lagerbestand – Tee & Kaffee</h1>
    <p class="subtitle">Mengen direkt eintragen und mit Name speichern.</p>

    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap">
      <input type="text" id="adm-lb-name" placeholder="Dein Name (Pflicht)"
        style="padding:9px 14px;border:1.5px solid var(--border);border-radius:3px;font-size:14px;font-family:'Segoe UI',sans-serif;width:220px">
      <button class="btn btn-primary" onclick="saveAdmLager()">💾 Bestand speichern</button>
    </div>

    <div class="card" style="padding:0;overflow:hidden;margin-bottom:28px">
      <table style="width:100%;border-collapse:collapse">
        <thead><tr style="background:var(--g100);border-bottom:2px solid var(--border)">
          <th style="text-align:left;padding:9px 16px;font-size:11px;text-transform:uppercase;color:var(--g500);letter-spacing:.07em">Artikel</th>
          <th style="text-align:left;padding:9px 10px;font-size:11px;text-transform:uppercase;color:var(--g500);letter-spacing:.07em">Einh.</th>
          <th style="text-align:center;padding:9px 10px;font-size:11px;text-transform:uppercase;color:var(--g500);letter-spacing:.07em">Bestand</th>
        </tr></thead>
        <tbody>${inputRows}</tbody>
      </table>
    </div>

    ${b1LagerLog.length > 0 ? `
    <div style="font-size:15px;font-weight:600;margin-bottom:10px">Buchungsprotokoll</div>
    <div class="card" style="padding:0;overflow:hidden">
      <table style="width:100%;border-collapse:collapse">
        <thead><tr style="background:var(--g100);border-bottom:1px solid var(--border)">
          <th style="text-align:left;padding:7px 12px;font-size:11px;text-transform:uppercase;color:var(--g500)">Zeit</th>
          <th style="text-align:left;padding:7px 12px;font-size:11px;text-transform:uppercase;color:var(--g500)">Artikel</th>
          <th style="text-align:left;padding:7px 12px;font-size:11px;text-transform:uppercase;color:var(--g500)">Δ</th>
          <th style="text-align:left;padding:7px 12px;font-size:11px;text-transform:uppercase;color:var(--g500)">Grund</th>
          <th style="text-align:left;padding:7px 12px;font-size:11px;text-transform:uppercase;color:var(--g500)">Bearbeiter</th>
        </tr></thead>
        <tbody>${logRows}</tbody>
      </table>
    </div>` : '<div class="card card-tinted" style="font-size:13px;color:var(--g500)">Noch keine Buchungen vorhanden.</div>'}`;
}

function saveAdmLager() {
  const bearbeiter = (document.getElementById('adm-lb-name')?.value || '').trim();
  if (!bearbeiter) {
    showToast('Bitte zuerst deinen Namen eintragen');
    document.getElementById('adm-lb-name')?.focus();
    return;
  }
  const gruppen = INVENTUR_VORLAGE.filter(s => s.gruppe === 'Tee' || s.gruppe === 'Kaffee');
  let changes = 0;
  gruppen.forEach(sec => {
    sec.items.forEach(art => {
      const inp = document.getElementById('adm-lb-' + esc(art.name));
      if (!inp) return;
      const newVal = parseInt(inp.value) || 0;
      const oldVal = b1Lager[art.name] || 0;
      const delta = newVal - oldVal;
      if (delta !== 0) {
        b1LagerLog.unshift({ ts: Date.now(), art: art.name, delta, grund: 'Manuell (Admin)', filiale: 'B1', bearbeiter });
        changes++;
      }
      b1Lager[art.name] = newVal;
    });
  });
  save('bock_v2_b1lager', b1Lager);
  save('bock_v2_b1lagerlog', b1LagerLog.slice(0, 500));
  showToast(changes > 0 ? `${changes} Änderung(en) gespeichert OK (${bearbeiter})` : 'Keine Änderungen festgestellt');
  renderAdmB1Lager();
}


function resetB1Lagerstartwerte() {
  Object.entries(B1_LAGER_STARTWERTE).forEach(([k,v]) => { b1Lager[k] = v; });
  save('bock_v2_b1lager', b1Lager);
  showToast('Startwerte wurden zurückgesetzt OK');
  if (document.getElementById('c-adm-b1lager')) renderAdmB1Lager();
  if (document.getElementById('c-b1-lagerbestand')) renderB1Lagerbestand();
}


// === RESET ALLE TESTDATEN =============================================
function resetAlleTestdaten() {
  if (!confirm('Wirklich alle Bestellungen, Inventuren, Temperaturprotokolle und Ankündigungen löschen?\n\nDer Lagerbestand bleibt erhalten.')) return;
  // Daten zurücksetzen
  orders = [];
  baekoBestellungen = [];
  inventuren = [];
  tempProtokolle = [];
  newsItems = [];
  b1LagerLog = [];
  // packState leeren
  if (typeof packState !== 'undefined') { for (const k in packState) delete packState[k]; }
  // localStorage leeren
  ['bock_v2_orders','bock_v2_baeko','bock_v2_inventur','bock_v2_temp','bock_v2_news','bock_v2_b1lagerlog'].forEach(k => {
    try { localStorage.removeItem(k); } catch(e) {}
  });
  showToast('OK Alle Testdaten gelöscht – System bereit');
  renderAdmHome();
}


</script>
